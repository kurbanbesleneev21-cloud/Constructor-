<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор Telegram Ботов</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <header class="gradient-bg text-white p-6 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">BotMaster AI</h1>
            <nav>
                <a href="#" class="px-4 hover:underline">Документация</a>
                <a href="#" class="bg-white text-indigo-600 px-4 py-2 rounded-lg font-semibold ml-4">Вход</a>
            </nav>
        </div>
    </header>

    <main class="container mx-auto mt-10 p-6 bg-white rounded-xl shadow-md">
        <h2 class="text-xl font-semibold mb-6">Создание нового бота</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Токен от @BotFather</label>
                <input type="text" placeholder="123456789:ABCDefGh..." class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Приветственное сообщение (/start)</label>
                <textarea rows="3" placeholder="Привет! Я ваш новый бот." class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm"></textarea>
            </div>

            <div class="p-4 border-2 border-dashed border-gray-200 rounded-lg">
                <p class="text-sm text-gray-500 text-center">Здесь будет визуальный конструктор кнопок</p>
                <button class="mt-2 w-full bg-gray-100 text-gray-600 py-2 rounded hover:bg-gray-200 transition">+ Добавить кнопку</button>
            </div>

            <button class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">
                Запустить бота
            </button>
        </div>
    </main>

    <footer class="text-center mt-10 text-gray-500 text-sm">
        &copy; 2026 Конструктор Ботов - Сделано с помощью AI
    </footer>

</body>
</html>
