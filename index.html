<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BotMaster AI | Конструктор</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
    <header class="bg-indigo-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold">BotMaster AI</h1>
        <div id="status" class="text-xs bg-indigo-500 px-3 py-1 rounded-full">Готов к работе</div>
    </header>

    <main class="p-4 max-w-2xl mx-auto space-y-6 pb-24">
        <div class="bg-white p-5 rounded-2xl shadow-sm border">
            <label class="block text-sm font-bold text-gray-700 mb-2">1. API Токен из @BotFather</label>
            <input type="text" id="botToken" placeholder="123456789:ABC..." class="w-full p-3 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400">
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border">
            <label class="block text-sm font-bold text-gray-700 mb-2">2. Текст приветствия (/start)</label>
            <textarea id="welcomeMsg" rows="3" class="w-full p-3 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400">Привет! Я твой новый бот.</textarea>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border">
            <label class="block text-sm font-bold text-gray-700 mb-2">3. Кнопки меню</label>
            <div id="buttonsContainer" class="space-y-3"></div>
            <button onclick="addButton()" class="w-full mt-3 py-3 border-2 border-dashed border-indigo-200 text-indigo-600 rounded-xl font-bold hover:bg-indigo-50">+ Добавить кнопку</button>
        </div>

        <button onclick="deployBot()" id="deployBtn" class="fixed bottom-6 left-4 right-4 bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-xl active:scale-95 transition">
            🚀 ЗАПУСТИТЬ БОТА
        </button>
    </main>

    <script>
        let btnCount = 0;

        function addButton() {
            btnCount++;
            const container = document.getElementById('buttonsContainer');
            const div = document.createElement('div');
            div.className = "flex gap-2 p-2 bg-gray-50 rounded-lg border";
            div.innerHTML = `
                <input type="text" placeholder="Имя кнопки" class="w-1/2 p-2 border rounded btn-name">
                <input type="text" placeholder="Ответ бота" class="w-1/2 p-2 border rounded btn-reply">
            `;
            container.appendChild(div);
        }

        async function deployBot() {
            const btn = document.getElementById('deployBtn');
            const token = document.getElementById('botToken').value;
            
            if(!token) return alert("Введите токен!");

            btn.innerText = "ЗАПУСКАЮ...";
            btn.disabled = true;

            const config = {
                token: token,
                welcome: document.getElementById('welcomeMsg').value,
                buttons: []
            };

            document.querySelectorAll('#buttonsContainer > div').forEach(div => {
                config.buttons.push({
                    name: div.querySelector('.btn-name').value,
                    reply: div.querySelector('.btn-reply').value
                });
            });

            try {
                // ВАЖНО: Замени URL ниже на адрес твоего сервера после деплоя на Render
                const response = await fetch('https://YOUR-SERVER-URL.render.com/create_bot', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(config)
                });
                
                if(response.ok) {
                    alert("✅ Бот запущен! Напиши ему в Telegram.");
                    document.getElementById('status').innerText = "Бот Активен";
                } else {
                    alert("❌ Ошибка сервера. Проверь токен.");
                }
            } catch (e) {
                alert("Ошибка: Сервер не отвечает. Нужно настроить Backend.");
            } finally {
                btn.innerText = "🚀 ЗАПУСТИТЬ БОТА";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
