<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Constructor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <!-- Шапка -->
    <header class="bg-white border-b p-4 mb-8 sticky top-0 z-10 shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-600"><i class="fas fa-robot mr-2"></i>BotBuilder</h1>
            <button onclick="exportConfig()" class="bg-green-500 text-white px-4 py-2 rounded-lg font-medium hover:bg-green-600 transition">
                <i class="fas fa-save mr-2"></i>Сохранить проект
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <div id="canvas" class="space-y-6">
            <!-- Сюда будут добавляться блоки -->
        </div>

        <!-- Кнопки управления -->
        <div class="mt-10 flex gap-4 pb-20">
            <button onclick="addBlock('message')" class="flex-1 bg-white border-2 border-dashed border-blue-400 p-4 rounded-xl text-blue-600 hover:bg-blue-50 transition">
                <i class="fas fa-comment-dots block text-2xl mb-2"></i>
                + Сообщение
            </button>
            <button onclick="addBlock('buttons')" class="flex-1 bg-white border-2 border-dashed border-purple-400 p-4 rounded-xl text-purple-600 hover:bg-purple-50 transition">
                <i class="fas fa-th-large block text-2xl mb-2"></i>
                + Кнопки
            </button>
        </div>
    </main>

    <script>
        let blockCount = 0;

        function addBlock(type) {
            blockCount++;
            const canvas = document.getElementById('canvas');
            const div = document.createElement('div');
            div.className = "bg-white p-6 rounded-xl shadow-md border border-slate-200 relative animate-fade-in";
            div.id = `block-${blockCount}`;
            
            let content = '';
            if(type === 'message') {
                content = `
                    <div class="flex items-center mb-3">
                        <span class="bg-blue-100 text-blue-600 px-2 py-1 rounded text-xs uppercase font-bold">Текст</span>
                    </div>
                    <textarea placeholder="Что скажет бот?" class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-400 outline-none"></textarea>
                `;
            } else {
                content = `
                    <div class="flex items-center mb-3">
                        <span class="bg-purple-100 text-purple-600 px-2 py-1 rounded text-xs uppercase font-bold">Меню</span>
                    </div>
                    <input type="text" placeholder="Текст перед кнопками" class="w-full border rounded-lg p-2 mb-3 outline-none">
                    <div class="space-y-2">
                        <input type="text" placeholder="Кнопка 1" class="w-full border-l-4 border-purple-400 bg-slate-50 p-2 rounded">
                        <input type="text" placeholder="Кнопка 2" class="w-full border-l-4 border-purple-400 bg-slate-50 p-2 rounded">
                    </div>
                `;
            }

            div.innerHTML = `
                ${content}
                <button onclick="this.parentElement.remove()" class="absolute top-4 right-4 text-slate-400 hover:text-red-500">
                    <i class="fas fa-trash"></i>
                </button>
            `;
            canvas.appendChild(div);
        }

        function exportConfig() {
            const blocks = document.querySelectorAll('#canvas > div');
            const config = [];
            blocks.forEach(block => {
                config.push({
                    id: block.id,
                    text: block.querySelector('textarea, input').value
                });
            });
            console.log("Конфигурация сохранена:", config);
            alert("Настройки сохранены в консоль! (В будущем это пойдет в базу данных)");
        }

        // Добавим первый блок при загрузке
        addBlock('message');
    </script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    </style>
</body>
</html>
