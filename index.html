<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BotMaster | Mobile Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .mobile-shadow { shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06); }
        /* Анимация появления меню */
        #mobile-menu { transition: transform 0.3s ease-in-out; }
        .hidden-menu { transform: translateX(-100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen overflow-x-hidden">

    <div id="mobile-menu" class="fixed inset-0 z-50 bg-indigo-700 w-64 p-6 text-white hidden-menu shadow-2xl">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-xl font-bold">Меню</h2>
            <button onclick="toggleMenu()" class="p-2 bg-indigo-600 rounded-lg">×</button>
        </div>
        <nav class="space-y-4">
            <a href="#" class="flex items-center gap-3 p-3 bg-white/10 rounded-xl"><span>🤖</span> Создать бота</a>
            <a href="#" class="flex items-center gap-3 p-3 hover:bg-white/5 rounded-xl"><span>📂</span> Мои боты</a>
            <a href="#" class="flex items-center gap-3 p-3 hover:bg-white/5 rounded-xl"><span>📊</span> Аналитика</a>
        </nav>
    </div>

    <header class="sticky top-0 z-40 bg-white border-b p-4 flex justify-between items-center shadow-sm">
        <button onclick="toggleMenu()" class="p-2 text-indigo-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <h1 class="text-xl font-extrabold text-indigo-700 tracking-tight">BotMaster AI</h1>
        <div class="w-8 h-8 rounded-full bg-indigo-100 border border-indigo-200 flex items-center justify-center text-xs font-bold text-indigo-600">K</div>
    </header>

    <main class="p-4 space-y-6 pb-24">
        
        <section class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
            <h3 class="font-bold text-gray-800 mb-3 flex items-center gap-2 text-lg">
                <span class="text-indigo-500">🔑</span> Настройка API
            </h3>
            <input type="text" id="botToken" placeholder="Токен от @BotFather" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-4 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
            <p class="text-[10px] text-gray-400 mt-2 px-1 text-center">Создайте бота в Telegram через @BotFather, чтобы получить ключ.</p>
        </section>

        <section class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
            <h3 class="font-bold text-gray-800 mb-3 text-lg">💬 Сообщение бота</h3>
            <textarea id="welcomeMsg" rows="3" placeholder="Приветствие при старте..." class="w-full bg-gray-50 border border-gray-200 rounded-xl p-4 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" oninput="updatePreview()"></textarea>
        </section>

        <section class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-gray-800 text-lg">🔘 Кнопки меню</h3>
                <span id="btnCount" class="text-xs bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-full font-bold">0/4</span>
            </div>
            
            <div id="buttonsContainer" class="space-y-3"></div>

            <button onclick="addButton()" class="mt-4 w-full flex items-center justify-center gap-2 bg-indigo-50 text-indigo-700 py-4 rounded-xl font-bold text-sm active:scale-95 transition">
                + Добавить кнопку
            </button>
        </section>

        <section class="mt-10">
            <h3 class="text-center text-sm font-bold text-gray-400 mb-4 uppercase tracking-widest">Как это выглядит</h3>
            <div class="bg-black rounded-[2.5rem] p-3 border-[6px] border-gray-800 shadow-xl max-w-[300px] mx-auto overflow-hidden">
                <div class="bg-gray-900 h-[380px] rounded-[1.8rem] relative flex flex-col">
                    <div id="chatArea" class="flex-1 p-3 overflow-y-auto space-y-3 pt-6">
                        <div id="previewMessage" class="bg-indigo-600 text-white p-3 rounded-2xl rounded-bl-none text-[12px] shadow-sm max-w-[85%]">
                            Привет! Напиши что-нибудь слева.
                        </div>
                    </div>
                    <div class="p-2 bg-gray-800 border-t border-gray-700 min-h-[80px]">
                        <div id="previewButtons" class="grid grid-cols-2 gap-1.5"></div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md border-t border-gray-100 z-30">
        <button onclick="saveBot()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-sm uppercase tracking-widest shadow-lg shadow-indigo-200 active:bg-indigo-800 transition">
            🚀 Запустить бота
        </button>
    </div>

    <script>
        let btnCount = 0;
        const menu = document.getElementById('mobile-menu');

        function toggleMenu() {
            menu.classList.toggle('hidden-menu');
        }

        function addButton() {
            if (btnCount >= 4) return alert("Максимум 4 кнопки для мобильной версии");
            btnCount++;
            document.getElementById('btnCount').innerText = `${btnCount}/4`;
            
            const container = document.getElementById('buttonsContainer');
            const div = document.createElement('div');
            div.className = "flex gap-2 animate-in fade-in slide-in-from-bottom-2 duration-300";
            div.id = `btn-group-${btnCount}`;
            div.innerHTML = `
                <input type="text" placeholder="Имя" class="w-full p-3 border border-gray-100 rounded-xl bg-gray-50 text-sm btn-label" oninput="updatePreview()">
                <button onclick="removeButton(${btnCount})" class="bg-red-50 text-red-500 px-4 rounded-xl font-bold">×</button>
            `;
            container.appendChild(div);
        }

        function removeButton(id) {
            document.getElementById(`btn-group-${id}`).remove();
            btnCount--;
            document.getElementById('btnCount').innerText = `${btnCount}/4`;
            updatePreview();
        }

        function updatePreview() {
            const txt = document.getElementById('welcomeMsg').value;
            document.getElementById('previewMessage').innerText = txt || "Привет! Напиши что-нибудь слева.";
            
            const previewButtonsArea = document.getElementById('previewButtons');
            previewButtonsArea.innerHTML = '';
            const labels = document.querySelectorAll('.btn-label');
            labels.forEach(input => {
                if(input.value.trim()) {
                    const b = document.createElement('div');
                    b.className = "bg-gray-700 text-white py-2 rounded-lg text-center text-[10px] font-bold border border-gray-600";
                    b.innerText = input.value;
                    previewButtonsArea.appendChild(b);
                }
            });
        }

        function saveBot() {
            const token = document.getElementById('botToken').value;
            if(!token) return alert("Введите токен!");
            alert("✅ Бот готов к сохранению!");
        }
    </script>
</body>
</html>
